<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Aaron Madjri</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header
            style="display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid var(--border-color);margin-bottom:20px;">
            <div style="font-weight:700;font-size:18px;">Aaron Madjri</div>
            <div style="font-weight:700;font-size:18px;color:var(--text-gray);">Contact</div>
            <a href="index.html" class="arrow-circle" title="Accueil">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </a>
        </header>

        <nav class="nav-bar">
            <div class="nav-links">
                <a href="index.html" class="nav-link">À propos</a>
                <a href="index.html#resume" class="nav-link">Mon parcours</a>
                <a href="projets.html" class="nav-link">Réalisations</a>
            </div>
            <div class="nav-icons">
                <a href="index.html#about" class="nav-icon-circle" title="Profil">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </a>
                <a href="CV_Aaron_2eme.pdf" download class="nav-icon-circle" title="CV">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                </a>
                <a href="contact.html" class="nav-icon-circle active" title="Contact"
                    style="background:var(--primary);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                </a>
            </div>
        </nav>

        <!-- Section Contact -->
        <section class="section-card">
            <div class="card-header">
                <h3>Me contacter</h3>
                <a href="#contact-form" class="arrow-circle" title="Aller au formulaire">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <polyline points="19 12 12 19 5 12" />
                    </svg>
                </a>
            </div>

            <div class="contact-form-grid">
                <!-- Socials -->
                <div>
                    <h4 style="font-size:28px;font-weight:900;line-height:1.1;margin-bottom:25px;">
                        Travaillons<br>ensemble</h4>
                    <div class="contact-grid" style="grid-template-columns:1fr;">
                        <a href="mailto:aaron.madjri@efrei.net" class="contact-card contact-card--dark">
                            <div class="contact-card__icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path
                                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                    <polyline points="22,6 12,13 2,6" />
                                </svg>
                            </div>
                            <div class="contact-card__label">Email</div>
                            <div class="contact-card__value">aaron.madjri@efrei.net</div>
                        </a>
                        <a href="https://linkedin.com/in/aaron-madjri" target="_blank" rel="noopener"
                            class="contact-card contact-card--blue">
                            <div class="contact-card__icon" style="font-size:24px;font-weight:900;line-height:1;">in
                            </div>
                            <div class="contact-card__label">LinkedIn</div>
                            <div class="contact-card__value">linkedin.com/in/aaron-madjri</div>
                        </a>
                        <a href="https://github.com/aarmad" target="_blank" rel="noopener"
                            class="contact-card contact-card--light">
                            <div class="contact-card__icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path
                                        d="M9 19C4 20.5 4 16.5 2 16M16 22V18.13C15.9731 17.6532 15.811 16.7238 15.06 15.52C18.2 15.17 21.5 13.98 21.5 8.52C21.4997 7.12 20.9627 5.78 20 4.77C20.4559 3.55 20.4236 2.2 19.91 1C19.91 1 18.73.65 16 2.48C13.708 1.86 11.292 1.86 9 2.48C6.27.65 5.09 1 5.09 1C4.576 2.2 4.544 3.55 5 4.77C4.03 5.79 3.49 7.14 3.5 8.55C3.5 13.97 6.8 15.16 9.94 15.55C9.611 15.89 9.357 16.3 9.195 16.74C9.033 17.18 8.967 17.66 9 18.13V22" />
                                </svg>
                            </div>
                            <div class="contact-card__label">GitHub</div>
                            <div class="contact-card__value">github.com/aarmad</div>
                        </a>
                        <a href="https://wa.me/33767020615" target="_blank" rel="noopener"
                            class="contact-card contact-card--green">
                            <div class="contact-card__icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path
                                        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 8.38 0 0 1 3.8.9L21 3.5Z" />
                                    <path
                                        d="M15.4 12.6c-.2-.1-.9-.4-1-.5s-.2-.1-.3 0-.4.5-.5.6-.2.1-.4 0a5.2 5.2 0 0 1-1.3-.9 5.8 5.8 0 0 1-1-1.2c-.1-.2 0-.3.1-.4l.3-.4c.1-.1.1-.2 0-.3s-.3-.9-.4-1.1c-.1-.1-.3-.2-.4-.2h-.3c-.2 0-.4.1-.5.3a2.5 2.5 0 0 0-.8 1.8c0 .6.2 1.2.5 1.8a7.1 7.1 0 0 0 3 3.1h.1c.3.1.5.1.8 0l.5-.1c.3-.1.4-.4.5-.7s0-.5-.1-.6Z" />
                                </svg>
                            </div>
                            <div class="contact-card__label">WhatsApp</div>
                            <div class="contact-card__value">(+33) 07 67 02 06 15</div>
                        </a>
                    </div>
                </div>

                <!-- Form -->
                <div id="contact-form" class="section-card"
                    style="margin:0;background:#f5f5f5;border-color:transparent;">
                    <form style="display:flex;flex-direction:column;gap:14px;">
                        <input type="text" placeholder="Votre Nom"
                            style="width:100%;padding:13px 16px;border-radius:var(--border-radius-sm);border:1px solid var(--border-color);background:white;font-family:inherit;font-size:14px;outline:none;">
                        <input type="email" placeholder="Votre Email"
                            style="width:100%;padding:13px 16px;border-radius:var(--border-radius-sm);border:1px solid var(--border-color);background:white;font-family:inherit;font-size:14px;outline:none;">

                        <div style="display:flex;flex-direction:column;">
                            <label class="contact-form-label">Canal de communication préféré :</label>
                            <select name="mode" class="contact-form-select">
                                <option value="whatsapp">WhatsApp (Direct)</option>
                                <option value="email">E-mail</option>
                                <option value="linkedin">LinkedIn (Presse-papier + Redirection)</option>
                            </select>
                        </div>

                        <textarea placeholder="Votre Message" rows="6"
                            style="width:100%;padding:13px 16px;border-radius:var(--border-radius-sm);border:1px solid var(--border-color);background:white;font-family:inherit;font-size:14px;resize:none;outline:none;"></textarea>
                        <button type="submit" class="btn btn-primary" style="padding:14px;font-size:14px;">Envoyer le
                            message</button>
                    </form>
                </div>
            </div>
        </section>

        <footer
            style="padding:40px 0;border-top:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;">
            <div style="color:var(--text-gray);font-size:14px;">&copy; 2026 Aaron Madjri</div>
            <div style="font-weight:800;color:var(--text-dark);font-size:16px;letter-spacing:2px;">RESTONS CONNECTÉS
            </div>
            <a href="#" class="arrow-circle" title="Retour en haut">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5" />
                    <polyline points="5 12 12 5 19 12" />
                </svg>
            </a>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vivus/0.4.6/vivus.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
